<html lang="pt">

<meta charset="UTF-8">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container { max-width: 900px; margin: 0 auto; }
  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: #f8fafc;
    margin-bottom: 0.3rem;
  }
  .subtitle {
    font-size: 0.85rem;
    color: #64748b;
    margin-bottom: 2rem;
  }

  .filters {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .filter-btn {
    padding: 0.35rem 0.9rem;
    border-radius: 999px;
    border: 1px solid #334155;
    background: transparent;
    color: #94a3b8;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.15s;
  }
  .filter-btn.active, .filter-btn:hover {
    background: #1e293b;
    color: #e2e8f0;
    border-color: #475569;
  }

  .search-wrap {
    margin-bottom: 1.5rem;
  }
  input[type="text"] {
    width: 100%;
    padding: 0.6rem 1rem;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    color: #e2e8f0;
    font-size: 0.9rem;
    outline: none;
  }
  input[type="text"]::placeholder { color: #475569; }

  .tier-block { margin-bottom: 2.5rem; }
  .tier-header {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid #1e293b;
  }
  .tier-badge {
    font-size: 0.7rem;
    font-weight: 700;
    padding: 0.2rem 0.6rem;
    border-radius: 6px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .tier-title { font-size: 1rem; font-weight: 600; }
  .tier-range { font-size: 0.75rem; color: #475569; margin-left: auto; }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 0.75rem;
  }
  .card {
    background: #1a1f2e;
    border: 1px solid #1e293b;
    border-radius: 10px;
    padding: 0.9rem 1rem;
    transition: border-color 0.15s;
    cursor: default;
  }
  .card:hover { border-color: #334155; }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 0.4rem;
  }
  .card-name { font-size: 0.9rem; font-weight: 600; color: #f1f5f9; }
  .score-badge {
    font-size: 0.75rem;
    font-weight: 700;
    padding: 0.15rem 0.5rem;
    border-radius: 6px;
    white-space: nowrap;
  }
  .card-cat {
    font-size: 0.7rem;
    color: #475569;
    margin-bottom: 0.5rem;
  }
  .card-benefits {
    font-size: 0.75rem;
    color: #94a3b8;
    line-height: 1.4;
  }
  .bar-wrap {
    margin-top: 0.6rem;
    background: #0f1117;
    border-radius: 999px;
    height: 4px;
    overflow: hidden;
  }
  .bar { height: 100%; border-radius: 999px; }

  .hidden { display: none; }

  /* Tier colors */
  .t5 { --color: #22c55e; --bg: #052e16; }
  .t4 { --color: #84cc16; --bg: #1a2e05; }
  .t3 { --color: #eab308; --bg: #2d1f02; }
  .t2 { --color: #f97316; --bg: #2d1000; }
  .t1 { --color: #ef4444; --bg: #2d0606; }

  .tier-badge, .score-badge { background: var(--bg); color: var(--color); }
  .tier-title { color: var(--color); }
  .bar { background: var(--color); }
</style>
</head>

const tiers = [
  { id: "t5", label: "Elite", range: "400–500", min: 400, max: 500 },
  { id: "t4", label: "Excelente", range: "300–399", min: 300, max: 399 },
  { id: "t3", label: "Bom", range: "200–299", min: 200, max: 299 },
  { id: "t2", label: "Razoável", range: "100–199", min: 100, max: 199 },
  { id: "t1", label: "Fraco", range: "0–99", min: 0, max: 99 },
];

let currentCat = 'all';

function renderTiers() {
  const search = document.getElementById('search').value.toLowerCase();
  const container = document.getElementById('tiers-container');
  container.innerHTML = '';

  tiers.forEach(tier => {
    const items = data
      .filter(d => d.score >= tier.min && d.score <= tier.max)
      .filter(d => currentCat === 'all' || d.cat === currentCat)
      .filter(d => d.name.toLowerCase().includes(search) || d.benefits.toLowerCase().includes(search))
      .sort((a, b) => b.score - a.score);

    if (items.length === 0) return;

    const block = document.createElement('div');
    block.className = `tier-block ${tier.id}`;
    block.innerHTML = `
      <div class="tier-header">
        <span class="tier-badge">${tier.id.replace('t','T')}</span>
        <span class="tier-title">${tier.label}</span>
        <span class="tier-range">${tier.range} pts · ${items.length} alimentos</span>
      </div>
      <div class="cards">
        ${items.map(item => `
          <div class="card ${tier.id}">
            <div class="card-top">
              <span class="card-name">${item.name}</span>
              <span class="score-badge">${item.score}</span>
            </div>
            <div class="card-cat">${catLabel(item.cat)}</div>
            <div class="card-benefits">${item.benefits}</div>
            <div class="bar-wrap"><div class="bar" style="width:${(item.score/500*100).toFixed(1)}%"></div></div>
          </div>
        `).join('')}
      </div>
    `;
    container.appendChild(block);
  });
}

function catLabel(cat) {
  const map = { vegetal:'🥬 Vegetal', fruta:'🍓 Fruta', proteína:'🥚 Proteína', gordura:'🫒 Gordura', leguminosa:'🫘 Leguminosa', especiaria:'🌿 Especiaria', fermentado:'🧫 Fermentado', outro:'⚙️ Outro' };
  return map[cat] || cat;
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTiers();
}

function filterCards() { renderTiers(); }

renderTiers();
